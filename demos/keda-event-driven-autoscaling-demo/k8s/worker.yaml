apiVersion: apps/v1
kind: Deployment
metadata:
  name: keda-worker
  namespace: keda-demo
  labels:
    app.kubernetes.io/name: keda-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: keda-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keda-worker
    spec:
      containers:
        - name: worker
          image: keda-redis-worker:0.1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
            - name: QUEUE_NAME
              value: work-items
            - name: PROCESSING_SECONDS
              value: "0.5"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
