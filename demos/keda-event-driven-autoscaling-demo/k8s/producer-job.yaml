apiVersion: batch/v1
kind: Job
metadata:
  name: keda-producer
  namespace: keda-demo
  labels:
    app.kubernetes.io/name: keda-producer
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keda-producer
    spec:
      restartPolicy: Never
      containers:
        - name: producer
          image: keda-redis-worker:0.1.0
          imagePullPolicy: IfNotPresent
          command: ["python", "producer.py"]
          env:
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
            - name: QUEUE_NAME
              value: work-items
            - name: MESSAGE_COUNT
              value: "250"
            - name: PUBLISH_DELAY_SECONDS
              value: "0.01"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
